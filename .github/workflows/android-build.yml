name: Build Interraqt APK

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build APK
      # 🚨 FIX: Instructs GitHub to build the highly optimized Release version
      run: gradle assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Interraqt-APK
        # 🚨 FIX: The wildcard automatically finds and uploads the APK no matter what folder it is in!
        path: app/build/outputs/apk/**/*.apk
        # 🚨 FIX: Indented properly under 'with:' so the upload step knows to use it!
        retention-days: 1
